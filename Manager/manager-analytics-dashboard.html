<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; color: white; font-family: Arial, sans-serif; padding: 10px; }
    h1 { color: #f97316; font-size: 20px; margin-bottom: 16px; }

    /* Period buttons */
    .period-btns { display: flex; gap: 30px; margin-bottom: 15px; }
    .period-btn { padding: 8px 10px; border-radius: 20px; border: 2px solid #f97316; background: none; color: #f97316; font-size: 17px; font-weight: bold; cursor: pointer; }
    .period-btn.active { background: #f97316; color: white; }

    /* Stat cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: #1e293b; border-radius: 12px; padding: 8px 8px; text-align: center; }
    .stat-label { font-size: 17px; color: #64748b; margin-bottom: 6px; }
    .stat-value { font-size: 16px; font-weight: bold; color: #f97316; }
    .stat-sub { font-size: 17px; color: #64748b; margin-top: 5px; }

    /* Chart */
    .chart-card { background: #1e293b; border-radius: 12px; padding: 10px; margin-bottom: 18px; }
    .chart-title { font-size: 17px; font-weight: 550; color: #cbd5e1; margin-bottom: 18px; }

    /* Top lists */
    .lists-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .list-card { background: #1e293b; border-radius: 12px; padding: 8px; }
    .list-title { font-size: 17px; font-weight: bold; color: #cbd5e1; margin-bottom: 10px; }
    .list-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; font-size: 15px; }
    .list-item:last-child { border-bottom: none; }
    .list-name { color: #cbd5e1; }
    .list-count { color: #f97316; font-weight: bold; }
    .empty { text-align: center; color: #666; font-size: 18px; margin-top: 40px; }

    @media (max-width: 600px) {
        .orders-grid, .menu-grid, .lists-grid, .stats-grid {
            grid-template-columns: repeat(2, 1fr);
        }
        body {
            padding: 12px;
        }
        .period-btns {
            flex-wrap: wrap;
        }
        .search-row {
            flex-direction: column;
        }
        .dish-actions {
            flex-direction: column;
        }
    }

    @media (min-width: 601px) and (max-width: 900px) {
        .orders-grid, .menu-grid {
            grid-template-columns: repeat(2, 1fr);
        }
        .stats-grid {
            grid-template-columns: repeat(2, 1fr);
        }
        .lists-grid {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 600px) {
        .menu-grid, .orders-grid, .restaurant-grid {
            grid-template-columns: 1fr;
        }
        body {
            padding: 12px;
        }
        h1 {
            font-size: 18px;
        }
    }
  </style>
</head>
<body>
     <button onclick="signOut()" style="position: fixed; top: 10px; right: 10px; background: #ef4444; color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 20px; z-index: 1000;">Sign Out</button>
  <h1>Analytics</h1>

  <div class="period-btns">
    <button class="period-btn active" onclick="setPeriod('today')">Today</button>
    <button class="period-btn" onclick="setPeriod('week')">Week</button>
    <button class="period-btn" onclick="setPeriod('month')">Month</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Revenue</div>
      <div class="stat-value" id="stat-revenue">-</div>
      <div class="stat-sub">DZD</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Orders</div>
      <div class="stat-value" id="stat-orders">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Customers</div>
      <div class="stat-value" id="stat-customers">-</div>
      <div class="stat-sub">unique phones</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Order</div>
      <div class="stat-value" id="stat-avg">-</div>
      <div class="stat-sub">DZD</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Revenue Trend</div>
    <canvas id="revenue-chart" height="120"></canvas>
  </div>

  <div class="lists-grid">
    <div class="list-card">
      <div class="list-title">Top Dishes</div>
      <div id="top-dishes"></div>
    </div>
    <div class="list-card">
      <div class="list-title">Top Customers</div>
      <div id="top-customers"></div>
    </div>
  </div>

  <script type="module">
    import { supabase } from '../app.js/supabase.js';

    const {data: {session}} = await supabase.auth.getSession();
    if (!session) {
      window.location.href = '../staff/staff-login.html';
    }

    window.signOut = async function () {
        await supabase.auth.signOut();
        window.location.href = '../staff/staff-login.html';
    }

    let currentPeriod = 'today';
    let revenueChart = null;

    window.setPeriod = function(period) {
      currentPeriod = period;
      document.querySelectorAll('.period-btn').forEach(function(btn) {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      loadAnalytics();
    };

    function getDateRange(period) {
      const now = new Date();
      let start;
      if (period === 'today') {
        start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      } else if (period === 'week') {
        start = new Date(now);
        start.setDate(now.getDate() - 7);
      } else {
        start = new Date(now);
        start.setDate(now.getDate() - 30);
      }
      return start.toISOString();
    }

    function getChartLabels(orders, period) {
      if (period === 'today') {
        const hours = {};
        for (let i = 0; i < 24; i++) hours[i] = 0;
        orders.forEach(function(o) {
          const h = new Date(o.created_at).getHours();
          hours[h] += Number(o['total amount']) || 0;
        });
        return {
          labels: Object.keys(hours).map(function(h) { return h + ':00'; }),
          values: Object.values(hours)
        };
      } else {
        const days = {};
        orders.forEach(function(o) {
          const d = new Date(o.created_at).toLocaleDateString();
          days[d] = (days[d] || 0) + (Number(o['total amount']) || 0);
        });
        return {
          labels: Object.keys(days),
          values: Object.values(days)
        };
      }
    }

    async function loadAnalytics() {
      const restaurantId = localStorage.getItem('restaurant_id');
      if (!restaurantId) return;

      const startDate = getDateRange(currentPeriod);

      const { data: orders, error } = await supabase
        .from('orders')
        .select('*')
        .eq('restaurant-id', restaurantId)
        .gte('created_at', startDate);

      if (error) {
        console.error('Analytics error:', error.message);
        return;
      }

      // Stats
      const totalOrders = orders.length;
      const revenue = orders.reduce(function(sum, o) { return sum + (Number(o['total amount']) || 0); }, 0);
      const uniqueCustomers = new Set(orders.map(function(o) { return o['customer-phone']; })).size;
      const avgOrder = totalOrders > 0 ? Math.round(revenue / totalOrders) : 0;

      document.getElementById('stat-revenue').innerText = revenue.toLocaleString();
      document.getElementById('stat-orders').innerText = totalOrders;
      document.getElementById('stat-customers').innerText = uniqueCustomers;
      document.getElementById('stat-avg').innerText = avgOrder.toLocaleString();

      // Chart
      const chartData = getChartLabels(orders, currentPeriod);
      if (revenueChart) revenueChart.destroy();
      const ctx = document.getElementById('revenue-chart').getContext('2d');
      revenueChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: chartData.labels,
          datasets: [{
            label: 'Revenue (DZD)',
            data: chartData.values,
            borderColor: '#f97316',
            backgroundColor: 'rgba(249,115,22,0.1)',
            fill: true,
            tension: 0.4,
            pointRadius: 3
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#64748b', maxTicksLimit: 8 }, grid: { color: '#1e293b' } },
            y: { ticks: { color: '#64748b' }, grid: { color: '#334155' } }
          }
        }
      });

      // Top dishes
      if (totalOrders > 0) {
        const orderIds = orders.map(function(o) { return o.id; });
        const { data: items } = await supabase
          .from('order items')
          .select('*')
          .in('order-id', orderIds);

        const dishCounts = {};
        items.forEach(function(i) {
          const name = i['dish_name'];
          dishCounts[name] = (dishCounts[name] || 0) + i.quantity;
        });

        const topDishes = Object.entries(dishCounts)
          .sort(function(a, b) { return b[1] - a[1]; })
          .slice(0, 5);

        let dishHTML = '';
        topDishes.forEach(function(d) {
          dishHTML += '<div class="list-item"><span class="list-name">' + d[0] + '</span><span class="list-count">x' + d[1] + '</span></div>';
        });
        document.getElementById('top-dishes').innerHTML = dishHTML || '<p class="empty">No data</p>';
      }

      // Top customers
      const customerCounts = {};
      orders.forEach(function(o) {
        const phone = o['customer-phone'];
        const name = o['customer-name'];
        if (!customerCounts[phone]) customerCounts[phone] = { name: name, count: 0 };
        customerCounts[phone].count++;
      });

      const topCustomers = Object.entries(customerCounts)
        .sort(function(a, b) { return b[1].count - a[1].count; })
        .slice(0, 5);

      let customerHTML = '';
      topCustomers.forEach(function(c) {
        customerHTML += '<div class="list-item"><span class="list-name">' + c[1].name + '<br><small style="color:#64748b">' + c[0] + '</small></span><span class="list-count">' + c[1].count + ' orders</span></div>';
      });
      document.getElementById('top-customers').innerHTML = customerHTML || '<p class="empty">No data</p>';
    }

    loadAnalytics();
  </script>

  <!-- Bottom Navigation -->
<div style="position:fixed; bottom:0; left:0; right:0; background:#1e293b; display:flex; border-top:1px solid #334155; z-index:999;">
  <a href="managers-order-board.html" style="flex:1; padding:8px 4px; text-align:center; text-decoration:none; color:#64748b; font-size:18px;">
    <div style="font-size:16px;">📋</div>
    Orders
  </a>
  <a href="manager-analytics-dashboard.html" style="flex:1; padding:8px 4px; text-align:center; text-decoration:none; color:#f97316; font-size:18px;">
    <div style="font-size:16px;">📊</div>
    Analytics
  </a>
  <a href="menu-management.html" style="flex:1; padding:8px 4px; text-align:center; text-decoration:none; color:#64748b; font-size:18px;">
    <div style="font-size:16px;">🍽️</div>
    Menu
  </a>
  <a href="staff-management.html" style="flex:1; padding:8px 4px; text-align:center; text-decoration:none; color:#64748b; font-size:18px;">
    <div style="font-size:16px;">👥</div>
    Staff
  </a>
  <a href="restaurant-settings.html" style="flex:1; padding:8px 4px; text-align:center; text-decoration:none; color:#64748b; font-size:18px;">
    <div style="font-size:16px;">⚙️</div>
    Settings
  </a>
</div>

<!-- Add padding so content doesn't hide behind tabs -->
<div style="height:40px;"></div>

</body>
</html>

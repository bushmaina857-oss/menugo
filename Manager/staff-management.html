<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Management</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; color: white; font-family: Arial, sans-serif; padding: 8px; }
    h1 { color: #f97316; font-size: 20px; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 16px; margin-bottom: 15px; }

    .staff-list { display: flex; flex-direction: column; gap: 15px; }
    .staff-row { background: #1e293b; border-radius: 10px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 5px solid #22c55e; transition: background 0.2s; }
    .staff-row:hover { background: #263548; }
    .staff-row.inactive { border-left-color: #64748b; opacity: 0.6; }
    .staff-left { display: flex; flex-direction: column; gap: 8px; }
    .staff-name { font-size: 18px; font-weight: bold; color: white; }
    .staff-role { font-size: 16px; color: #94a3b8; }
    .staff-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    .status-badge { padding: 5px 6px; border-radius: 15px; font-size: 16px; font-weight: bold; }
    .status-badge.active { background: #22c55e; color: white; }
    .status-badge.inactive { background: #64748b; color: white; }
    .empty { text-align: center; color: #666; font-size: 18px; margin-top: 40px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1e293b; border-radius: 14px; padding: 24px; width: 90%; max-width: 420px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 18px; font-weight: bold; color: #f97316; }
    .close-btn { background: none; border: none; color: #aaa; font-size: 18px; cursor: pointer; }
    .detail-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
    .detail-label { font-size: 22px; color: #64748b; }
    .detail-value { font-size: 25px; color: white; }
    .divider { border: none; border-top: 1px solid #334155; margin: 16px 0; }
    .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .toggle-label { font-size: 17px; color: white; }
    .toggle { position: relative; width: 48px; height: 26px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #334155; border-radius: 26px; cursor: pointer; transition: 0.3s; }
    .toggle-slider:before { position: absolute; content: ''; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
    input:checked + .toggle-slider { background: #22c55e; }
    input:checked + .toggle-slider:before { transform: translateX(22px); }
    .save-btn { width: 100%; padding: 8px; background: #f97316; color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; }

    @media (max-width: 600px) {
        .orders-grid, .menu-grid, .lists-grid, .stats-grid {
            grid-template-columns: 1fr;
        }
        body {
            padding: 12px;
        }
        .period-btns {
            flex-wrap: wrap;
        }
        .search-row {
            flex-direction: column;
        }
        .dish-actions {
            flex-direction: column;
        }
    }

    @media (min-width: 601px) and (max-width: 900px) {
        .orders-grid, .menu-grid {
            grid-template-columns: repeat(2, 1fr);
        }
        .stats-grid {
            grid-template-columns: repeat(2, 1fr);
        }
        .lists-grid {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 600px) {
        .menu-grid, .orders-grid, .restaurant-grid {
            grid-template-columns: 1fr;
        }
        body {
            padding: 8px;
        }
        h1 {
            font-size: 20px;
        }
    }
  </style>
</head>
<body>
    <button onclick="signOut()" style="position: fixed; top: 10px; right: 10px; background: #ef4444; color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 13px; z-index: 1000;">Sign Out</button>
  <h1>Staff Management</h1>
  <p class="subtitle">Tap a staff member to see details</p>
  <div class="staff-list" id="staff-container">
    <p class="empty">Loading staff...</p>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-name"></span>
        <button class="close-btn" onclick="closeModal()">x</button>
      </div>
      <div class="detail-row">
        <span class="detail-label">Role</span>
        <span class="detail-value" id="modal-role"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Phone</span>
        <span class="detail-value" id="modal-phone"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Joined</span>
        <span class="detail-value" id="modal-joined"></span>
      </div>
      <hr class="divider">
      <div class="toggle-row">
        <span class="toggle-label">Active Staff Member</span>
        <label class="toggle">
          <input type="checkbox" id="modal-isactive">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <button class="save-btn" onclick="saveStaffStatus()">Save Changes</button>
    </div>
  </div>

  <script type="module">
    import { supabase } from '../app.js/supabase.js';

    const {data: {session}} = await supabase.auth.getSession();
    if (!session) {
      window.location.href = '../staff/staff-login.html';
    }

    window.signOut = async function () {
        await supabase.auth.signOut();
        window.location.href = '../staff/staff-login.html';
    }

    const restaurantId = localStorage.getItem('restaurant_id');
    let currentStaffId = null;

    async function loadStaff() {
      if (!restaurantId) {
        document.getElementById('staff-container').innerHTML = '<p class="empty">No restaurant selected.</p>';
        return;
      }

      const { data: staff, error } = await supabase
        .from('profiles')
        .select('*')
        .eq('restaurant-id', restaurantId)
        .order('full_name', { ascending: true });

      if (error) {
        console.error('Failed to load staff:', error.message);
        return;
      }

      const container = document.getElementById('staff-container');

      if (staff.length === 0) {
        container.innerHTML = '<p class="empty">No staff members found.</p>';
        return;
      }

      container.innerHTML = '';
      window._staff = staff;

      staff.forEach(function(member) {
        const isActive = member.is_active;
        const rowClass = isActive ? 'staff-row' : 'staff-row inactive';
        const badgeClass = isActive ? 'status-badge active' : 'status-badge inactive';
        const badgeText = isActive ? 'Active' : 'Inactive';

        container.innerHTML += '<div class="' + rowClass + '" onclick="openModal(\'' + member.id + '\')">' +
          '<div class="staff-left">' +
          '<span class="staff-name">' + member.full_name + '</span>' +
          '<span class="staff-role">' + member.role + '</span>' +
          '</div>' +
          '<div class="staff-right">' +
          '<span class="' + badgeClass + '">' + badgeText + '</span>' +
          '</div>' +
          '</div>';
      });
    }

    window.openModal = function(staffId) {
      const member = window._staff.find(function(s) { return s.id === staffId; });
      currentStaffId = staffId;

      document.getElementById('modal-name').innerText = member.full_name;
      document.getElementById('modal-role').innerText = member.role;
      document.getElementById('modal-phone').innerText = member.phone || 'N/A';
      document.getElementById('modal-joined').innerText = new Date(member.created_at).toLocaleDateString();
      document.getElementById('modal-isactive').checked = member.is_active;

      document.getElementById('modal-overlay').classList.add('active');
    };

    window.closeModal = function() {
      document.getElementById('modal-overlay').classList.remove('active');
      currentStaffId = null;
    };

    window.saveStaffStatus = async function() {
      const isActive = document.getElementById('modal-isactive').checked;

      const { error } = await supabase
        .from('profiles')
        .update({ is_active: isActive })
        .eq('id', currentStaffId);

      if (error) {
        console.error('Update failed:', error.message);
        alert('Failed to update staff status.');
        return;
      }

      closeModal();
      loadStaff();
    };

    loadStaff();
  </script>

  <!-- Bottom Navigation -->
<div style="position:fixed; bottom:0; left:0; right:0; background:#1e293b; display:flex; border-top:1px solid #334155; z-index:999;">

</div>

</body>
</html>

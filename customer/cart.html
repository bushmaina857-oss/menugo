<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Your Cart</title>
    </head>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 8px;
            background-color: #365e5c;
        }
        /*Header styling*/
        .header {
            text-align: center;
            margin-bottom: 10px;
            border: #241b41 2px solid;
            border-radius: 15px;
            padding: 8px;
            background-color: #0e0f31;
            color: #f97316;
        }
        .cart-item {
            display: inline-flex;            
            border: 2px solid #241b41;
            border-radius: 15px;
            padding: 5px 6px;
            align-items: center;
            justify-content: space-between;
            width: 90%;
            background-color: #868383;
            flex-direction: row;
            margin-bottom: 10px;
            margin-top: 8px;
        }
        .dish-info {
            border: #241b41 1px solid;
            border-radius: 10px;
            padding: 5px;
            width: 45%;
            
        }
        .cart-items {
            background-color: #0e0f31;
            padding: 5px;
            display: inline-block;
            flex-direction: column;
            gap: 14px;
            margin-top: 10px;
            border: 2px solid #241b41;
            border-radius: 15px;
            margin-bottom: 10px;
            width: 100%;
        }
        .quantity-controls {
            display: flex;
            border: #241b41 1px solid;
            border-radius: 10px;
            padding: 10px;
            margin-top:10px;
        }
        .quantity-num {
            font-size: 17px;
            padding: 8px;
            text-align: center;
            min-width: 24px;
            font-weight: 700;
        }
        
        .quantity-btn {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 50%;
            background-color: #241b41;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .order-summary {
            border: #241b41 1px solid;
            border-radius: 10px;
            width: 50%;
            margin-top: 10px;
            padding: 10px;
            background-color: #a9cacc;
            color: black;
        }
        .continue-btn,
        .checkout-btn {
            background-color: darkgreen;
            border: none;
            border-radius: 15px;
            color: aliceblue;
            margin-top: 10px;
            font-size:17px;
            font-weight: 540;
            padding: 5px;
            display: inline-block; 
            cursor: pointer; 
            gap: 10px; 
        }
        .actions {
            justify-content: space-evenly;
            display: flex;
        }

        @media (max-width: 600px) {
        .orders-grid, .menu-grid, .lists-grid, .stats-grid {
            grid-template-columns: 1fr;
        }
        body {
            padding: 8px;
        }
        .period-btns {
            flex-wrap: wrap;
        }
        .search-row {
            flex-direction: column;
        }
        .dish-actions {
            flex-direction: column;
        }
    }

    @media (min-width: 601px) and (max-width: 900px) {
        .orders-grid, .menu-grid {
            grid-template-columns: repeat(2, 1fr);
        }
        .stats-grid {
            grid-template-columns: repeat(2, 1fr);
        }
        .lists-grid {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 600px) {
        .menu-grid, .orders-grid, .restaurant-grid {
            grid-template-columns: 1fr;
        }
        body {
            padding: 6px;
        }
        h1 {
            font-size: 20px;
        }
    }

    </style>
    <body>
        <!-- Header of the page -->
        <div class="header">
            <h1>Your Cart</h1>
        </div>

        <!--Cart items-->
        <div class="cart-items" id="cart-items-list">
            <!-- Items will be displayed here -->          
     
        </div> 
        
            <!-- Order Summary -->
            <div class="order-summary">
                <h3>Order Summary</h3>
                <p>Total Items: <span id="summary-item-count">0</span></p>
                <h4>Total Price: <span id="summary-grand-total">Dzd 0</span></h4>
            </div>

            <!-- Actions-->
            <div class="actions">
                <button class="continue-btn" onclick="window.location.href='menu.html' ">Back to Shopping</button>
                <button class="checkout-btn" onclick="window.location.href='checkout.html' ">Proceed to Checkout</button>
                
            </div>
        

        <script type= "module" src="../app.js/cart-page.js"></script>
    </body>
</html>
